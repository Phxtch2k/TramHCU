<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🚋 Smart Tram + ETA</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

/* MAP */
.map {
  position: relative;
  width: 100%;
  height: 450px;
  background: #14532d;
  border-top: 3px solid #22c55e;
  overflow: hidden;
}

/* station */
.station {
  position: absolute;
  width: 14px;
  height: 14px;
  background: gray;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.active {
  background: red;
  box-shadow: 0 0 10px red;
}

/* label */
.label {
  position: absolute;
  font-size: 12px;
  transform: translate(-50%, -50%);
  margin-top: 18px;
}

/* tram */
#tram {
  position: absolute;
  font-size: 28px;
  transform: translate(-50%, -50%);
  transition: all 0.8s ease;
}

/* panel */
.panel {
  padding: 10px;
}

.card {
  background: #1e293b;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  padding: 6px;
  border-bottom: 1px solid #334155;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="header">🚋 Smart Tram System + ETA</div>

<!-- ================= MAP ================= -->
<div class="map" id="map">

  <div id="s1" class="station"></div>
  <div id="l1" class="label">ประตูเขียว</div>

  <div id="s2" class="station"></div>
  <div id="l2" class="label">โรงโภชนาการ 1</div>

  <div id="s3" class="station"></div>
  <div id="l3" class="label">หน้าม.</div>

  <div id="tram">🚋</div>

</div>

<!-- ================= STATUS ================= -->
<div class="panel">
  <div class="card">
    📍 Station: <span id="station">-</span><br>
    📶 RSSI: <span id="rssi">-</span><br>
    🕒 Time: <span id="time">-</span><br>
    ⏱ ETA Next: <span id="next">-</span>
  </div>

  <div class="card">
    <h3>📜 History</h3>
    <ul id="logs"></ul>
  </div>
</div>

<script>

// ================= FORMAT TIME =================
function formatThaiTime(isoString) {
  const d = new Date(isoString);

  const pad = (n) => n.toString().padStart(2, '0');

  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} `
       + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

// ================= FIREBASE =================
firebase.initializeApp({
  databaseURL: "https://trackingrealtime-9a5a1-default-rtdb.firebaseio.com"
});

const db = firebase.database();

// ================= MAP DATA =================
const stations = {
  "ประตูเขียว": {x: 120, y: 120, id: "s1"},
  "โรงโภชนาการ 1": {x: 300, y: 200, id: "s2"},
  "หน้าม.": {x: 200, y: 350, id: "s3"}
};

const stationOrder = ["ประตูเขียว","โรงโภชนาการ 1","หน้าม."];

// ================= ETA CONFIG =================
const AVG_TIME_PER_STATION = 15; // ⏱ ปรับได้ (วินาที)

// ================= SCALE =================
function getScale() {
  const map = document.getElementById("map");
  return {
    sx: map.clientWidth / 400,
    sy: map.clientHeight / 450
  };
}

// ================= APPLY POSITIONS =================
function applyStations() {
  const scale = getScale();

  Object.keys(stations).forEach(name => {

    const s = stations[name];

    const x = s.x * scale.sx;
    const y = s.y * scale.sy;

    document.getElementById(s.id).style.left = x + "px";
    document.getElementById(s.id).style.top = y + "px";

    document.getElementById("l" + s.id.replace("s","")).style.left = x + "px";
    document.getElementById("l" + s.id.replace("s","")).style.top = (y + 18) + "px";
  });
}

// ================= ETA CALC =================
function calculateETA(currentStation) {
  let i = stationOrder.indexOf(currentStation);

  let next = stationOrder[(i + 1) % stationOrder.length];

  return {
    nextStation: next,
    eta: AVG_TIME_PER_STATION
  };
}

// ================= MOVE TRAM =================
function moveTram(station, rssi, time){

  const pos = stations[station];
  if (!pos) return;

  const scale = getScale();

  const x = pos.x * scale.sx;
  const y = pos.y * scale.sy;

  // clear active
  document.querySelectorAll(".station").forEach(s=>{
    s.classList.remove("active");
  });

  document.getElementById(pos.id).classList.add("active");

  // move tram
  const tram = document.getElementById("tram");
  tram.style.left = x + "px";
  tram.style.top = y + "px";

  // UI
  document.getElementById("station").innerText = station;
  document.getElementById("rssi").innerText = rssi;
  document.getElementById("time").innerText = formatThaiTime(time);

  // ETA
  const eta = calculateETA(station);
  document.getElementById("next").innerText =
    `${eta.nextStation} (~${eta.eta} sec)`;
}

// ================= FIREBASE LIVE =================
db.ref("tram/status").on("value", (snap) => {
  const d = snap.val();
  if (!d) return;

  moveTram(d.station, d.rssi, d.time);
});

// ================= HISTORY =================
db.ref("tram/logs").limitToLast(10).on("value", (snap) => {
  const data = snap.val();
  const list = document.getElementById("logs");
  list.innerHTML = "";

  for (let id in data) {
    let li = document.createElement("li");
    li.innerText = `${data[id].station} | ${formatThaiTime(data[id].time)}`;
    list.appendChild(li);
  }
});

// ================= INIT =================
window.onload = function(){
  applyStations();
};

window.onresize = function(){
  applyStations();
};

</script>

</body>
</html>
