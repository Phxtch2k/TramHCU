<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where’s My Tram? - Real-time Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
    <style>
        :root { --bg-color: #fff9e8; --panel-bg: #fffdf4; --accent-color: #efdfac; --text-main: #4b4120; --text-sub: #9f8b56; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Prompt', sans-serif; background: var(--bg-color); color: var(--text-main); padding: 10px; }
        .page { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin: 20px 0; }
        .header h1 { margin: 0; font-size: 28px; }
        .header p { margin: 5px 0; color: var(--text-sub); font-size: 14px; }
        .layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
        .panel { background: var(--panel-bg); border: 1px solid var(--accent-color); border-radius: 24px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .title { font-weight: 700; font-size: 18px; }
        .live-tag { font-size: 12px; background: #ffeb3b; padding: 4px 12px; border-radius: 20px; font-weight: bold; animation: blink 1.5s infinite; }
        .map-box { position: relative; width: 100%; background: #eee; border-radius: 16px; overflow: hidden; line-height: 0; }
        .map-stage { position: relative; width: 100%; height: auto; display: inline-block; }
        .map-stage img { width: 100%; height: auto; display: block; }
        #tram { position: absolute; transform: translate(-50%, -40%); font-size: clamp(24px, 5vw, 40px); transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); }
        .info-card { background: #fff; border: 1px solid var(--accent-color); border-radius: 16px; padding: 16px; margin-bottom: 15px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f4e8; }
        .info-row:last-child { border: 0; }
        .val { font-weight: 600; }
        .good { color: #2e7d32; }
        .medium { color: #f57f17; }
        .bad { color: #d32f2f; }
        .history-list { list-style: none; padding: 0; margin: 10px 0 0; max-height: 250px; overflow-y: auto; }
        .history-item { padding: 8px 0; font-size: 13px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        @keyframes blink { 50% { opacity: 0.5; } }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .panel { padding: 15px; } }
    </style>
</head>
<body>

<div class="page">
    <div class="header">
        <h1>🚋 Where’s My Tram?</h1>
        <p>Real-time tracking. No more guessing. 👀</p>
    </div>

    <div class="layout">
        <div class="panel">
            <div class="top-bar">
                <div class="title">Live Tracking</div>
                <div class="live-tag">● LIVE</div>
            </div>
            <div class="map-box">
                <div class="map-stage">
                    <img src="./a.png" alt="Map">
                    <div id="tram">🚋</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="info-card">
                <div class="info-row"><span>📍 Station</span><span id="st-name" class="val">-</span></div>
                <div class="info-row"><span>📶 RSSI</span><span id="st-rssi" class="val">-</span></div>
                <div class="info-row"><span>🕒 Last Seen</span><span id="st-time" class="val">-</span></div>
                <div class="info-row"><span>⏱ Next Station</span><span id="st-next" class="val">-</span></div>
                <div style="font-size:11px; color:#999; margin-top:10px; text-align:right" id="update-tick">Last updated: -</div>
            </div>
            <div class="info-card" style="margin-bottom:0">
                <b style="font-size:14px">📜 History (Last 20)</b>
                <div id="logs-container" class="history-list"><div class="history-item">ยังไม่มีข้อมูล</div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://trackingrealtime-9a5a1-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const stations = {
        "ประตูเขียว": { x: 10.0, y: 41.5 },
        "หน้ามหาวิทยาลัย": { x: 85, y: 75.5 },
        "โรงโภชนาการ 1": { x: 48.0, y: 16.8 }
    };
    const routeOrder = ["ประตูเขียว", "หน้ามหาวิทยาลัย", "โรงโภชนาการ 1"];
    
    let lastStationTime = null; // เวลาที่เจอสถานีล่าสุด (Timestamp)
    let predictedTravelTime = 60; // ระยะเวลาเฉลี่ยที่คาดว่าจะใช้ไปยังสถานีถัดไป
    let nextStationName = "-";

    // ดึงค่าเฉลี่ยที่เคยจำไว้ในเครื่องมาใช้ก่อน (ถ้ามี)
    let travelTimes = JSON.parse(localStorage.getItem('tramTravelTimes')) || {
        "ประตูเขียว->หน้ามหาวิทยาลัย": 60,
        "หน้ามหาวิทยาลัย->โรงโภชนาการ 1": 45,
        "โรงโภชนาการ 1->ประตูเขียว": 50
    };

    function getRssiStatus(rssi) {
        if (!rssi) return { text: "-", class: "" };
        const val = Number(rssi);
        if (val >= -60) return { text: val + " dBm (Strong)", class: "good" };
        if (val >= -80) return { text: val + " dBm (Fair)", class: "medium" };
        return { text: val + " dBm (Weak)", class: "bad" };
    }

    function formatThaiDate(timestamp) {
        const d = new Date(timestamp);
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = String(d.getFullYear() + 543).slice(-2); 
        return `${day}/${month}/${year} ${d.toLocaleTimeString("th-TH")}`;
    }

    function updateTravelTimesFromLogs(logArray) {
        if (logArray.length < 2) return;
        for (let i = 1; i < logArray.length; i++) {
            const fromSt = logArray[i-1].station.trim();
            const toSt = logArray[i].station.trim();
            const timeDiff = (new Date(logArray[i].time) - new Date(logArray[i-1].time)) / 1000;

            if (stations[fromSt] && stations[toSt] && fromSt !== toSt && timeDiff > 5 && timeDiff < 900) {
                const routeKey = `${fromSt}->${toSt}`;
                travelTimes[routeKey] = Math.round((travelTimes[routeKey] * 0.7) + (timeDiff * 0.3));
            }
        }
        localStorage.setItem('tramTravelTimes', JSON.stringify(travelTimes));
    }

    function updateUI(data) {
        if (!data || !data.station) return;
        const sName = data.station.trim();
        const pos = stations[sName];

        document.getElementById("st-name").innerText = sName;
        document.getElementById("st-time").innerText = formatThaiDate(data.time);
        
        const rssiInfo = getRssiStatus(data.rssi);
        const rssiEl = document.getElementById("st-rssi");
        rssiEl.innerText = rssiInfo.text;
        rssiEl.className = "val " + rssiInfo.class;

        if (pos) {
            const tram = document.getElementById("tram");
            tram.style.display = "block";
            tram.style.left = pos.x + "%";
            tram.style.top = pos.y + "%";
        }

        const idx = routeOrder.indexOf(sName);
        if (idx !== -1) {
            nextStationName = routeOrder[(idx + 1) % routeOrder.length];
            const routeKey = `${sName}->${nextStationName}`;
            predictedTravelTime = travelTimes[routeKey] || 60;
        } else {
            nextStationName = "นอกเส้นทางปกติ";
        }
        
        lastStationTime = new Date(data.time).getTime();
    }

    db.ref("tram/status").on("value", snap => { if (snap.val()) updateUI(snap.val()); });

    db.ref("tram/logs").limitToLast(20).on("value", snap => {
        const data = snap.val();
        if (!data) return;
        const logArray = Object.values(data);
        updateTravelTimesFromLogs(logArray);
        updateUI(logArray[logArray.length - 1]);

        const container = document.getElementById("logs-container");
        container.innerHTML = "";
        [...logArray].reverse().forEach(log => {
            container.innerHTML += `<div class="history-item"><span>📍 ${log.station}</span><span style="color:#888">${formatThaiDate(log.time)}</span></div>`;
        });
    });

    // --- ส่วนการคำนวณแบบ Real System Time ---
    setInterval(() => {
        if (lastStationTime) {
            const now = Date.now();
            const diffInSeconds = Math.floor((now - lastStationTime) / 1000);
            
            // อัปเดตตัวเลข Last updated
            document.getElementById("update-tick").innerText = `Last updated: ${Math.max(0, diffInSeconds)}s ago`;
            
            // อัปเดต ETA โดยใช้: (เวลาที่คาดการณ์ - เวลาที่ผ่านไปแล้ว)
            if (nextStationName !== "นอกเส้นทางปกติ") {
                let remainingETA = predictedTravelTime - diffInSeconds;
                
                // ถ้าติดลบ หรือเหลือน้อย ให้ค้างไว้ที่ ~5s (เพื่อสื่อว่ารถน่าจะมาถึงแล้วหรือช้ากว่ากำหนด)
                if (remainingETA < 5) remainingETA = 5; 
                
                document.getElementById("st-next").innerText = `${nextStationName} (~${remainingETA}s)`;
            }
        }
    }, 1000);
</script>
</body>
</html>
